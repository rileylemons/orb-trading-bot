name: ORB Trading Bot

on:
  schedule:
    # 13:45 UTC = 9:45 AM EDT (summer) / 8:45 AM EST (winter)
    # Starts exactly when OR closes — bot fetches OR bars immediately and begins watching
    - cron: '45 13 * * 1-5'
  workflow_dispatch:   # lets you click "Run workflow" manually to test

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # GitHub's 6-hour hard limit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run ORB bot
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          EOD_HOUR:   '14'
          EOD_MINUTE: '40'
        run: node bot.js
